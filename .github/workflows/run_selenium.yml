name: Run Amazon Automation Pipeline

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # Is se aap GitHub Actions tab se manually bhi run kar sakti hain

jobs:
  run-selenium:
    runs-on: ubuntu-latest # GitHub ka cloud Linux runner

    steps:
      # 1. Code Download Karna
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Python Setup
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 3. Google Chrome Install Karna (CI Runner Par)
      - name: Install Google Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      # 4. Dependencies Install Karna
      - name: Install Python Dependencies
        run: |
          pip install selenium webdriver-manager

      # 5. Script Executed in Headless Environment
      - name: Run Selenium Amazon Scraper
        env:
          HEADLESS: "true"
        run: |
          python amzon_login.py

      # 6. Generated CSV Upload Karna (Artifacts)
      - name: Upload Output CSV File
        uses: actions/upload-artifact@v4
        with:
          name: amazon-products-result
          path: amazon_products.csv